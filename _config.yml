# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
blog_name: Avi's Notes
blog_description: Thoughts on OR, ML, and research
permalink: /blog/:year/:title/
pagination:
  enabled: true

# Atom feed
feed:
  tabs: true
  feeds:
    - type: all_posts

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

# Announcements / News
announcements:
  enabled: true
  scrollable: true
  limit: 5

latest_posts:
  enabled: false
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - vendor

keep_files:
  - CNAME
  - .nojekyll
  - .git

# -----------------------------------------------------------------------------
# Jekyll Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-archives
  - jekyll-diagrams
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Scholar (Publications)
# -----------------------------------------------------------------------------
scholar:
  last_name: [Avi, Islam]
  first_name: [Rupok, Rupok Islam]
  style: apa
  locale: en
  sort_by: year, month
  order: descending
  group_by: year
  group_order: descending
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters:
    - superscript
    - latex
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  bibliography_list_attributes:
    reversed: "reversed"

enable_publication_thumbnails: true
enable_math: true

# -----------------------------------------------------------------------------
# Minifier
# -----------------------------------------------------------------------------
jekyll-minifier:
  exclude: ["robots.txt"]
  uglifier_args:
    harmony: true

# -----------------------------------------------------------------------------
# Archives
# -----------------------------------------------------------------------------
jekyll-archives:
  enabled:
    - year
    - tags
    - categories
  layouts:
    year: archive-year
    tag: archive-tag
    category: archive-category
  permalinks:
    year: "/blog/:year/"
    tag: "/blog/tag/:name/"
    category: "/blog/category/:name/"

# Display different badges for your publications
# Options: google_scholar_stats, altmetric, dimensions, inspirehep
display_publication_badges:
  google_scholar_stats: true
  altmetric: false
  dimensions: false
  inspirehep: false
